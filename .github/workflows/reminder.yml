name: Daily reminder
on:
  schedule:
    # 5分ごとに終日実行し、ユーザーが選んだ任意の時刻(分単位)を
    # 5分単位のスロットで判定して送信する(GitHub Actionsで安定して
    # 保証できる最小間隔が5分程度のため)
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install firebase-admin@12 --no-save
      - run: node scripts/send-reminders.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
