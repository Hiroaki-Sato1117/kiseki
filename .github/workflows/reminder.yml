name: Daily reminder
on:
  schedule:
    # UTC 10:00-14:00 = JST 19:00-23:00 に毎時実行
    - cron: '0 10-14 * * *'
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install firebase-admin@12 --no-save
      - run: node scripts/send-reminders.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
